<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Hand/glove with all 4 fingers pointing upward -->
  <!-- Outline: index(x4-9), middle(x10-15), ring(x16-21), pinky(x22-26), palm(x4-26,y18-30) -->
  <path d="M4,1 H9 V17 H10 V4 H15 V17 H16 V7 H21 V17 H22 V10 H26 V30 H4 Z"
        fill="white" stroke="#555" stroke-width="1.5" stroke-linejoin="miter" stroke-linecap="square"/>
  <!-- Seam lines on palm -->
  <line x1="10" y1="19" x2="10" y2="27" stroke="#555" stroke-width="1" stroke-linecap="square"/>
  <line x1="16" y1="19" x2="16" y2="27" stroke="#555" stroke-width="1" stroke-linecap="square"/>
  <line x1="22" y1="19" x2="22" y2="27" stroke="#555" stroke-width="1" stroke-linecap="square"/>
</svg>
